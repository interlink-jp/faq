<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "ja" }}">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
<link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
<link rel="stylesheet" href="https://unpkg.com/applause-button/dist/applause-button.css">
<script src="https://unpkg.com/applause-button/dist/applause-button.js"></script>
{% include head-custom.html %}
<style>
pre{position:relative}
.copy-btn{position:absolute;top:6px;right:6px;padding:2px 8px;font-size:12px;line-height:1.4;color:#586069;background:rgba(175,184,193,.2);border:1px solid rgba(175,184,193,.4);border-radius:4px;cursor:pointer;opacity:0;transition:opacity .15s}
pre:hover .copy-btn,.copy-btn:focus{opacity:1}
.copy-btn:hover{background:rgba(175,184,193,.35)}
.copy-btn[data-copied]{color:#22863a;border-color:rgba(34,134,58,.4)}
</style>
</head>
<body>
<div class="container-lg px-3 my-5 markdown-body">
{% if site.title and site.title != page.title %}
<h1><a href="{{ "/" | absolute_url }}">{{ site.title }}</a></h1>
{% endif %}

{{ content }}

<div style="text-align: center; margin-top: 3em; padding-top: 2em; border-top: 1px solid #e1e4e8;">
<p>この記事が役に立ったら押してください（ログイン不要）</p>
<applause-button multiclap="false" style="width: 58px; height: 58px; margin: 0 auto;"></applause-button>
</div>

<div style="margin-top: 2em; padding-top: 2em; border-top: 1px solid #e1e4e8;">
<p>コメント・リアクション（GitHubアカウントが必要です）</p>
<script src="https://giscus.app/client.js"
        data-repo="interlink-jp/faq"
        data-repo-id="R_kgDOR3wsew"
        data-category="Announcements"
        data-category-id="DIC_kwDOR3wse84C6RWV"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="light"
        data-lang="ja"
        crossorigin="anonymous"
        async>
</script>
</div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js"
integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
<script>anchors.add();</script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('pre > code').forEach(function(code){
    var pre=code.parentNode;
    var btn=document.createElement('button');
    btn.className='copy-btn';
    btn.textContent='コピー';
    btn.setAttribute('aria-label','コードをクリップボードにコピー');
    btn.addEventListener('click',function(){
      navigator.clipboard.writeText(code.textContent).then(function(){
        btn.textContent='コピー済み';
        btn.setAttribute('data-copied','');
        setTimeout(function(){btn.textContent='コピー';btn.removeAttribute('data-copied')},2000);
      });
    });
    pre.appendChild(btn);
  });
});
</script>
</body>
</html>
